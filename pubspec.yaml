name: mahsa_navigation
description: "MAHSA Smart Campus Navigation"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_tts: ^4.0.2

  # UPDATED: Latest compatible versions for Web
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  intl: ^0.19.0 # date format

  # Google Maps
  google_maps_flutter: ^2.6.0
  google_maps_flutter_web: ^0.5.4
  geolocator: ^11.0.0 
  flutter_polyline_points: ^2.0.0

  # UI
  google_fonts: ^6.1.0
  provider: ^6.1.1
  flutter_spinkit: ^5.2.0

  # Icons
  cupertino_icons: ^1.0.2

  # Http EmailJs
  http: ^1.6.0
  url_launcher: ^6.3.2
  font_awesome_flutter: ^10.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  # This section ensures your images work later
  assets:
    - assets/images/walking_person.png